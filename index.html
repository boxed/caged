<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Guitar Fretboard Visualizer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <style>
        :root {
            color-scheme: light dark;
            --bg:            light-dark(#fafafa, #161616);
            --surface:       light-dark(#ffffff, #1f1f1f);
            --surface-bd:    light-dark(#e0e0e0, #3a3a3a);
            --text:          light-dark(#222,    #e8e8e8);
            --text-2:        light-dark(#555,    #a8a8a8);
            --text-strong:   light-dark(#333,    #f0f0f0);
            --nut:           light-dark(#2a2a2a, #d8d8d8);
            --fret-line:     light-dark(#b8b8b8, #555);
            --string:        light-dark(#a0a0a0, #707070);
            --inlay-board:   light-dark(#e4e4e4, #3a3a3a);
            --inlay-below:   light-dark(#7a7a7a, #888);
            --note-bg:       light-dark(#ffffff, #242424);
            --note-bd:       light-dark(#3a3a3a, #b8b8b8);
            --note-text:     light-dark(#202020, #e8e8e8);
            --chord-bd:      light-dark(#2a2a2a, #dcdcdc);
            --root-bg:       light-dark(#2a2a2a, #e8e8e8);
            --root-text:     light-dark(#ffffff, #161616);
            --fret-num:      light-dark(#444,    #bbb);
            --fret-num-bg:   light-dark(#ededed, #2e2e2e);
            --triangle:      light-dark(#888,    #a8a8a8);
            --btn-bg:        light-dark(#ffffff, #262626);
            --btn-bd:        light-dark(#bbb,    #4a4a4a);
            --btn-text:      light-dark(#333,    #d8d8d8);
            --btn-on-bg:     light-dark(#2a2a2a, #e8e8e8);
            --btn-on-text:   light-dark(#ffffff, #161616);
            /* Dark-mode colors: shared hues with light pastels, but high chroma
               in oklab space so they read as vivid after the 0.45 overlay blend. */
            --box-1: light-dark(#c7a8d4, oklch(0.52 0.27 305));
            --box-2: light-dark(#f4b683, oklch(0.63 0.17  55));
            --box-3: light-dark(#98cfe3, oklch(0.58 0.19 230));
            --box-4: light-dark(#f5adbb, oklch(0.58 0.22  10));
            --box-5: light-dark(#aed9a2, oklch(0.62 0.20 140));
        }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        body {
            width: max-content;
            max-width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
            padding-top: env(safe-area-inset-top);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
        }
        #app {
            margin: 2rem 1rem;
            padding: 24px;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="elm.js"></script>
    <script>
        Elm.Main.init({ node: document.getElementById('app') });
    </script>
</body>
</html>
